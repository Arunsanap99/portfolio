<!doctype html>
<html lang="en" class="dark scroll-smooth theme-purple">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⚡%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arun Sanap | Premium Full Stack MERN Developer Portfolio</title>
    <meta name="description" content="Portfolio of Arun Sanap, a premium Full Stack MERN Developer specializing in building scalable web applications with React, Node.js, Express, MongoDB, and modern UI/UX design." />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet" />
    <script>
      // Apply saved theme instantly to prevent flash of wrong color
      (function() {
        var saved = localStorage.getItem('portfolio-theme');
        if (saved && saved !== 'theme-purple') {
          document.documentElement.classList.remove('theme-purple');
          if (saved !== 'theme-monochrome') {
            document.documentElement.classList.add(saved);
          }
        }
      })();
    </script>
    <style>
      /* Initial loader page background colors to prevent flashing */
      body {
        background-color: #000000;
        color: #f8fafc;
        margin: 0;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-background text-foreground antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
